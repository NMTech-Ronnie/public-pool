version: '3.8'
services:
  traefik:
    image: "traefik:latest"
    container_name: "traefik"
    restart: unless-stopped
    command:
      - "--accesslog=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.selfhostedservices.acme.tlschallenge=true"
      - "--certificatesresolvers.selfhostedservices.acme.email=912097713@qq.com"
      - "--certificatesresolvers.selfhostedservices.acme.storage=/letsencrypt/acme.json"
      - "--serversTransport.insecureSkipVerify=true"
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - "lets-encrypt-data:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  bitcoind:
    image: ghcr.io/sethforprivacy/bitcoind:latest
    restart: unless-stopped
    container_name: bitcoind
    volumes:
      - bitcoind-data:/bitcoin/.bitcoin
      - ./bitcoin.conf:/bitcoin/.bitcoin/bitcoin.conf
    ports:
      - 8333:8333

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: publicpool
      POSTGRES_PASSWORD: publicpool
      POSTGRES_DB: publicpool
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command:
      - "postgres"
      - "-c"
      - "max_connections=500"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=6GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U publicpool"]
      interval: 5s
      timeout: 5s
      retries: 5

  public-pool:
    container_name: public-pool
    build:
      context: .
      dockerfile: Dockerfile
    image: public-pool:local
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "0.0.0.0:3333:3333/tcp"
      - "0.0.0.0:3334:3334/tcp"
    volumes:
      - "./pool.env:/public-pool/.env:ro"
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=publicpool
      - POSTGRES_PASSWORD=publicpool
      - POSTGRES_DB=publicpool
      - POSTGRES_POOL_MAX=60
      - CLUSTER_WORKERS=6
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.public-pool-api.rule=Host(`solobtc.nmminer.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.public-pool-api.tls.certresolver=selfhostedservices"
      - "traefik.http.routers.public-pool-api.entrypoints=websecure"
      - "traefik.http.services.public-pool-api.loadbalancer.server.port=3334"

  public-pool-ui:
    container_name: public-pool-ui
    build: ./public-pool-ui
    restart: unless-stopped
    environment:
      - DOMAIN=solobtc.nmminer.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.public-pool-ui.rule=Host(`solobtc.nmminer.com`)"
      - "traefik.http.routers.public-pool-ui.tls.certresolver=selfhostedservices"
      - "traefik.http.routers.public-pool-ui.entrypoints=websecure"
      - "traefik.http.services.public-pool-ui.loadbalancer.server.port=80"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

volumes:
    lets-encrypt-data:
    bitcoind-data:
    postgres-data:
