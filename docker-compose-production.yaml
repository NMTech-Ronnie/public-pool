version: '3.8'
services:
  traefik:
    image: "traefik:latest"
    container_name: "traefik"
    restart: unless-stopped
    command:
      - "--accesslog=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.selfhostedservices.acme.tlschallenge=true"
      - "--certificatesresolvers.selfhostedservices.acme.email=912097713@qq.com"
      - "--certificatesresolvers.selfhostedservices.acme.storage=/letsencrypt/acme.json"
      - "--serversTransport.insecureSkipVerify=true"
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - "lets-encrypt-data:/letsencrypt"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  postgres:
    image: postgres:16-alpine
    container_name: public-pool-postgres
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: publicpool
      POSTGRES_PASSWORD: publicpool
      POSTGRES_DB: publicpool
      # Tuned for 8-core/16GB server — overcomes Node.js single-thread bottleneck
      # by running multiple pool instances across CPU cores
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      POSTGRES_INITDB_WALDIR: "/var/lib/postgresql/wal"
    command: >
      postgres
      -c max_connections=150
      -c shared_buffers=4GB
      -c effective_cache_size=12GB
      -c maintenance_work_mem=1GB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=32MB
      -c default_statistics_target=200
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=40MB
      -c min_wal_size=2GB
      -c max_wal_size=8GB
      -c max_worker_processes=8
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
      -c max_parallel_maintenance_workers=4
    deploy:
      resources:
        limits:
          cpus: '3.00'
          memory: 4G
        reservations:
          cpus: '1.00'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U publicpool -d publicpool"]
      interval: 5s
      timeout: 5s
      retries: 5

  bitcoind:
    image: ghcr.io/sethforprivacy/bitcoind:latest
    restart: unless-stopped
    container_name: bitcoind
    volumes:
      - bitcoind-data:/bitcoin/.bitcoin
      - ./bitcoin.conf:/bitcoin/.bitcoin/bitcoin.conf
    ports:
      - 8333:8333

  public-pool:
    container_name: public-pool
    build:
      context: ./public-pool
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    deploy:
      replicas: 5
      resources:
        limits:
          cpus: '1.00'
          memory: 1.5G
        reservations:
          cpus: '0.50'
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "0.0.0.0:3333:3333/tcp"
      - "0.0.0.0:3334:3334/tcp"
    volumes:
      - "./pool.env:/public-pool/.env:ro"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=publicpool
      - DB_PASSWORD=publicpool
      - DB_NAME=publicpool
      - INSTANCE_COUNT=5
      - DB_POOL_MAX=50
      - JOB_CACHE_TTL_MS=120000
      - BITCOIN_POLL_MS=500
      - WORKER_POLL_MS=1000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.public-pool-api.rule=Host(`solobtc.nmminer.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.public-pool-api.tls.certresolver=selfhostedservices"
      - "traefik.http.routers.public-pool-api.entrypoints=websecure"
      - "traefik.http.services.public-pool-api.loadbalancer.server.port=3334"

  public-pool-ui:
    container_name: public-pool-ui
    build: ./public-pool-ui
    restart: unless-stopped
    environment:
      - DOMAIN=solobtc.nmminer.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.public-pool-ui.rule=Host(`solobtc.nmminer.com`)"
      - "traefik.http.routers.public-pool-ui.tls.certresolver=selfhostedservices"
      - "traefik.http.routers.public-pool-ui.entrypoints=websecure"
      - "traefik.http.services.public-pool-ui.loadbalancer.server.port=80"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

volumes:
    lets-encrypt-data:
    bitcoind-data:
    postgres-data:
