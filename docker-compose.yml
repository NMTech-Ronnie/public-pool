version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: public-pool-postgres
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: publicpool
      POSTGRES_PASSWORD: publicpool
      POSTGRES_DB: publicpool
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U publicpool -d publicpool"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"

  public-pool:
    container_name: public-pool
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${STRATUM_PORT}:${STRATUM_PORT}/tcp"
      - "127.0.0.1:${API_PORT}:${API_PORT}/tcp"
    volumes:
      - "./.env:/public-pool/.env:ro"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=publicpool
      - DB_PASSWORD=publicpool
      - DB_NAME=publicpool

volumes:
  postgres-data:
