version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: public-pool-postgres-mainnet
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: publicpool
      POSTGRES_PASSWORD: publicpool
      POSTGRES_DB: publicpool
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U publicpool -d publicpool"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bitcoin

  bitcoin:
    container_name: bitcoin
    build:
      context: ./docker/bitcoin
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - bitcoin
    ports:
      - "127.0.0.1:8332:8332/tcp"
      - "0.0.0.0:8333:8333/tcp"
    command: >
      -printtoconsole
      -datadir=/app/data
    volumes:
      - "./data/mainnet/bitcoin:/app/data"
      - "./bitcoin-mainnet.conf:/app/data/bitcoin.conf:ro"

  public-pool:
    container_name: public-pool
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bitcoin
    ports:
      - "0.0.0.0:3333:3333/tcp"
      - "127.0.0.1:3334:3334/tcp"
    volumes:
      - "./public-pool-mainnet.env:/public-pool/.env:ro"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=publicpool
      - DB_PASSWORD=publicpool
      - DB_NAME=publicpool

volumes:
  postgres-data:

networks:
  bitcoin:
