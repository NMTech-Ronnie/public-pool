version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: public-pool-postgres-regtest
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: publicpool
      POSTGRES_PASSWORD: publicpool
      POSTGRES_DB: publicpool
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U publicpool -d publicpool"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bitcoin-regtest

  bitcoin-regtest:
    container_name: bitcoin-regtest
    build:
      context: ./docker/bitcoin
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - bitcoin-regtest
    ports:
      - "127.0.0.1:28332:28332/tcp"
      - "0.0.0.0:28333:28333/tcp"
    command: >
      -printtoconsole
      -datadir=/app/data
      -regtest
      -blockversion=536870912
    volumes:
      - "./data/regtest/bitcoin:/app/data"
      - "./bitcoin-regtest.conf:/app/data/bitcoin.conf:ro"

  public-pool-regtest:
    container_name: public-pool-regtest
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bitcoin-regtest
    ports:
      - "0.0.0.0:23333:23333/tcp"
      - "127.0.0.1:23334:23334/tcp"
    volumes:
      - "./public-pool-regtest.env:/public-pool/.env:ro"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=publicpool
      - DB_PASSWORD=publicpool
      - DB_NAME=publicpool

volumes:
  postgres-data:

networks:
  bitcoin-regtest:
