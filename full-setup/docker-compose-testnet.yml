version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: public-pool-postgres-testnet
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: publicpool
      POSTGRES_PASSWORD: publicpool
      POSTGRES_DB: publicpool
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U publicpool -d publicpool"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bitcoin-testnet

  bitcoin-testnet:
    container_name: bitcoin-testnet
    build:
      context: ./docker/bitcoin
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    networks:
      - bitcoin-testnet
    ports:
      - "127.0.0.1:18332:18332/tcp"
      - "0.0.0.0:18333:18333/tcp"
    command: >
      -printtoconsole
      -datadir=/app/data
      -testnet
    volumes:
      - "./data/testnet/bitcoin:/app/data"
      - "./bitcoin-testnet.conf:/app/data/bitcoin.conf:ro"

  public-pool-testnet:
    container_name: public-pool-testnet
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bitcoin-testnet
    ports:
      - "0.0.0.0:13333:13333/tcp"
      - "127.0.0.1:13334:13334/tcp"
    volumes:
      - "./public-pool-testnet.env:/public-pool/.env:ro"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=publicpool
      - DB_PASSWORD=publicpool
      - DB_NAME=publicpool

volumes:
  postgres-data:

networks:
  bitcoin-testnet:
